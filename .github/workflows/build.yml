name: Build ESP-IDF Project

on:
  push:
    branches:
      - dev
      - Ethernet-support
    paths:
      - 'main/**'
      - 'web/**'
      - 'CMakeLists.txt'
      - 'sdkconfig.defaults'
      - 'partitions.csv'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'main/**'
      - 'web/**'
      - 'CMakeLists.txt'
      - 'sdkconfig.defaults'
      - 'partitions.csv'
      - '.github/workflows/build.yml'
  
# Grant permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  
jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # List the targets you want to build for here
        #target: [esp32, esp32c3, esp32c6, esp32s3]
        target: [esp32]
    
    # Use the official Espressif IDF Docker image
    # 'latest' usually points to the latest stable release (currently v5.x)
    container: espressif/idf:release-v5.4

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.target }}-

      - name: Build Firmware
        shell: bash
        env: 
          IDF_CCACHE_ENABLE: "1"
          CCACHE_DIR: "${{ github.workspace }}/.ccache"
        run: |
          . $IDF_PATH/export.sh
          # Ensure ccache dir exists
          mkdir -p $CCACHE_DIR
          idf.py set-target ${{ matrix.target }}
          idf.py build
          idf.py merge-bin # Creates build/merged-binary.bin

      - name: Upload Single Binary
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}
          path: build/merged-binary.bin
  deploy-web:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup Web Directory
        run: |
          # Get branch name from clean variable
          BRANCH_NAME=${GITHUB_REF_NAME}
          echo "Deploying for branch: $BRANCH_NAME"
          
          mkdir -p public/firmware/$BRANCH_NAME
          cp web/index.html public/index.html

      - name: Process Firmware & Generate Manifests
        run: |
          BRANCH_NAME=${GITHUB_REF_NAME}
          
          for chip in esp32 esp32c3 esp32c6 esp32s3; do
            echo "Processing $chip for branch $BRANCH_NAME..."
            mkdir -p public/firmware/$BRANCH_NAME/$chip
            
            # Map build target to correct ESP Web Tools chipFamily name
            case $chip in
              esp32)   FAMILY="ESP32" ;;
              esp32c3) FAMILY="ESP32-C3" ;;
              esp32c6) FAMILY="ESP32-C6" ;;
              esp32s3) FAMILY="ESP32-S3" ;;
              *)       FAMILY="ESP32" ;; # Default fallback
            esac

            # Move and rename the single binary
            # Check if artifact exists first (matrix might be partial if we changed it, but here it is fixed)
            if [ -f artifacts/firmware-$chip/merged-binary.bin ]; then
                cp artifacts/firmware-$chip/merged-binary.bin public/firmware/$BRANCH_NAME/$chip/firmware.bin
                
                # Generate manifest with correct chipFamily
                  cat <<EOF > public/firmware/$BRANCH_NAME/$chip/manifest.json
          {
            "name": "LEDVANCE BLE Mesh ($FAMILY) - $BRANCH_NAME",
            "version": "latest",
            "builds": [
              {
                "chipFamily": "$FAMILY",
                "parts": [
                  { "path": "firmware.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF
            else 
                echo "Warning: No firmware found for $chip"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
